version: "3.8"

services:
  toy-store-web:
    container_name: toy-store-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Cấu hình biến môi trường Supabase tại đây để Docker truyền vào container
      # - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    volumes:
      # Mount project into container (optional for dev).
      - ./:/app:cached
      # Use a named volume for node_modules so host's node_modules doesn't override container's.
      - node_modules:/app/node_modules

volumes:
  node_modules:
